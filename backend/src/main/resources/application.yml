spring:
  application:
    name: homeo-ai
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/homeo}
    username: ${DB_USER:homeo}
    password: ${DB_PASSWORD:homeo}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.lob.non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://ollama:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.1:8b-instruct-q4_0}
          temperature: 0.3
      embedding:
        options:
          model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        initialize-schema: false
        schema-name: public
        table-name: medicine_vectors

server:
  port: 8080
  forward-headers-strategy: native

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-must-be-at-least-256-bits-long-ok}
    ttl-minutes: 1440
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:19006}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
