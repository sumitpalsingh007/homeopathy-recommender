name: web

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/web.yml']
  pull_request:
    paths: ['web/**']
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS REQUIRED (set in GitHub → Settings → Secrets → Actions):
#
#  AWS_DEPLOY_ROLE_ARN    Same OIDC role as backend.yml.
#                         Must have: s3:PutObject, s3:DeleteObject, s3:ListBucket,
#                                    cloudfront:CreateInvalidation
#
#  WEB_BUCKET             S3 bucket name for the web UI.
#                         Get it after first terraform apply:
#                           terraform output -raw web_bucket
#                         Format: homeo-ai-web-123456789012
#
#  CF_DIST_ID             CloudFront Distribution ID.
#                         Get it after first terraform apply:
#                           terraform output -raw cloudfront_id
#                         Format: EXXXXXXXXXXXXXXX
#
#  VITE_API_BASE          (Optional) Backend API URL for production.
#                         Format: https://your-backend-domain.com/api
#                         If omitted, defaults to /api (same-origin proxy won't
#                         work in production; you must set this).
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    name: Build React app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Upload static assets with long cache (1 year) – hashed filenames change on rebuild
          aws s3 sync dist/assets s3://${{ secrets.WEB_BUCKET }}/assets \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

          # Upload index.html with no-cache so users always get latest routing
          aws s3 cp dist/index.html s3://${{ secrets.WEB_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

          # Sync everything else (icons, manifest, etc.)
          aws s3 sync dist s3://${{ secrets.WEB_BUCKET }} \
            --exclude "assets/*" \
            --exclude "index.html" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DIST_ID }} \
            --paths "/index.html" "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "CloudFront invalidation started: $INVALIDATION_ID"
