name: backend

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend.yml']
  pull_request:
    paths: ['backend/**']

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: homeo-ai-backend

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS REQUIRED (set in GitHub → Settings → Secrets → Actions):
#
#  AWS_DEPLOY_ROLE_ARN      IAM Role ARN that GitHub OIDC can assume.
#                           Must have: ECR push, SSM SendCommand, EC2 describe.
#                           Format: arn:aws:iam::123456789012:role/homeo-ai-deploy
#
#  ECR_REGISTRY             Your ECR registry URL (no repo suffix).
#                           Format: 123456789012.dkr.ecr.ap-south-1.amazonaws.com
#                           Get it: aws ecr get-authorization-token --region ap-south-1
#                                   OR: terraform output -raw ecr_registry
#
# HOW TO CREATE THE OIDC ROLE (one-time setup):
#   1. In AWS Console → IAM → Identity providers → Add provider
#      Provider URL: https://token.actions.githubusercontent.com
#      Audience: sts.amazonaws.com
#   2. Create IAM role "homeo-ai-deploy" with trust:
#      {
#        "Principal": {"Federated": "arn:aws:iam::ACCOUNT:oidc-provider/token.actions.githubusercontent.com"},
#        "Action": "sts:AssumeRoleWithWebIdentity",
#        "Condition": {"StringEquals": {
#          "token.actions.githubusercontent.com:aud": "sts.amazonaws.com",
#          "token.actions.githubusercontent.com:sub": "repo:YOUR_ORG/YOUR_REPO:ref:refs/heads/main"
#        }}
#      }
#   3. Attach these policies to the role:
#      - AmazonEC2ContainerRegistryPowerUser (for ECR push)
#      - AmazonSSMFullAccess (for SSM Run Command to deploy to EC2)
#      - AmazonEC2ReadOnlyAccess (to find instance IDs by tag)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Copy medicine CSV for build context
        run: |
          cp src/main/resources/medicine_master.csv backend/src/main/resources/ 2>/dev/null || true

      - name: Maven verify (compile + test)
        working-directory: backend
        run: mvn -B -ntp verify

  deploy:
    name: Build Image & Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write   # Required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC – no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copy medicine CSV for Docker build
        run: |
          cp src/main/resources/medicine_master.csv backend/src/main/resources/ 2>/dev/null || true

      # Push :latest AND :<sha> so rollback is possible
      - name: Build, tag and push Docker image
        working-directory: backend
        run: |
          REGISTRY="${{ secrets.ECR_REGISTRY }}"
          IMAGE="$REGISTRY/${{ env.ECR_REPOSITORY }}"
          docker build -t "$IMAGE:latest" -t "$IMAGE:${{ github.sha }}" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          echo "FULL_IMAGE=$IMAGE:${{ github.sha }}" >> $GITHUB_ENV

      # Zero-downtime deploy: SSM Run Command pulls new :latest image in-place.
      # No instance replacement needed → no 3-min downtime from ASG refresh.
      #
      # Why base64? SSM --parameters JSON chokes on $(()), $(), quotes, and
      # newlines in inline scripts. base64-encoding the script sidesteps all
      # escaping issues and lets us use full bash safely on the instance.
      - name: Deploy via SSM Run Command
        run: |
          # Find the running EC2 instance launched by the ASG
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:appName,Values=homeopathy-recommender" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ${{ env.AWS_REGION }})

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No running instance found – skipping SSM deploy (ASG will use :latest on next launch)"
            exit 0
          fi

          echo "Deploying to instance: $INSTANCE_ID"

          # Build the deploy script and base64-encode it so SSM JSON doesn't
          # choke on special characters ($(()), $(), quotes, newlines).
          DEPLOY_B64=$(base64 -w0 << 'DEPLOY_EOF'
          #!/bin/bash
          set -euo pipefail
          cd /opt/homeo-ai

          echo "=== Pulling latest backend image ==="
          docker compose pull backend

          echo "=== Restarting backend container ==="
          docker compose up -d --no-deps backend

          echo "=== Waiting up to 3 min for Spring Boot health check ==="
          for i in $(seq 1 18); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend healthy after $((i * 10))s"
              exit 0
            fi
            echo "Attempt $i/18 – not ready yet, retrying in 10s..."
            sleep 10
          done

          echo "HEALTH_CHECK_FAILED – backend did not become healthy within 180s"
          echo "=== Last 50 lines of backend logs ==="
          docker compose logs --tail=50 backend
          exit 1
          DEPLOY_EOF
          )

          # SSM receives a single command: decode the base64 script and run it
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[\"echo $DEPLOY_B64 | base64 -d | bash\"]}" \
            --timeout-seconds 300 \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to finish (poll every 10 s, max 5 min)
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ${{ env.AWS_REGION }} \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i/30 – Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "✓ Deploy successful"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "✗ Deploy failed — stdout:"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "StandardOutputContent" --output text
              echo "--- stderr:"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for deploy"
          exit 1
