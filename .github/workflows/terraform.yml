name: terraform

on:
  push:
    branches: [main]
    paths: ['terraform/**', '.github/workflows/terraform.yml']
  pull_request:
    paths: ['terraform/**']

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.9.5

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS REQUIRED (set in GitHub → Settings → Secrets → Actions):
#
#  AWS_DEPLOY_ROLE_ARN    Same OIDC role as other workflows.
#                         Must have: AdministratorAccess (Terraform creates all resources)
#                         OR a custom policy covering: EC2, RDS, S3, CloudFront,
#                            IAM, VPC, ASG, EFS, CloudWatch, SSM.
#
#  TF_STATE_BUCKET        S3 bucket that holds terraform.tfstate.
#                         Create once manually (see DEPLOYMENT_RUNBOOK.md):
#                           aws s3api create-bucket --bucket homeo-ai-tfstate-ACCOUNT_ID ...
#                         Format: homeo-ai-tfstate-123456789012
#
#  TF_VAR_DB_PASSWORD     RDS master password.  Generate once and store:
#                           openssl rand -base64 16
#                         Must be >= 8 chars, no @, /, or space.
#
#  TF_VAR_JWT_SECRET      JWT signing secret for the Spring Boot app.
#                           openssl rand -base64 32
#                         Must be >= 32 chars.
#
# VARIABLES PASSED AS ENV (no secret needed):
#  TF_VAR_region, TF_VAR_project  → hardcoded in versions.tf defaults
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  plan-apply:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write   # post plan output as PR comment

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=mvp/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.TF_VAR_JWT_SECRET }}
        run: |
          terraform plan \
            -input=false \
            -out=plan.tfplan \
            -no-color \
            2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      # Post plan as PR comment so you can review before merging to main
      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.TF_VAR_JWT_SECRET }}
        run: terraform apply -auto-approve -input=false plan.tfplan

      # After apply, store dynamic outputs back as secrets isn't possible,
      # but we print them here so you can update WEB_BUCKET + CF_DIST_ID secrets.
      - name: Print outputs (save these as secrets)
        if: github.ref == 'refs/heads/main'
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.TF_VAR_JWT_SECRET }}
        run: |
          echo "──────────────────────────────────────────────────────"
          echo "Copy these values into GitHub Secrets if not already set"
          echo "──────────────────────────────────────────────────────"
          echo "WEB_BUCKET     = $(terraform output -raw web_bucket 2>/dev/null)"
          echo "CF_DIST_ID     = $(terraform output -raw cloudfront_id 2>/dev/null)"
          echo "ECR_REGISTRY   = $(terraform output -raw ecr_registry 2>/dev/null || echo 'Not available – check outputs.tf')"
          echo "──────────────────────────────────────────────────────"
